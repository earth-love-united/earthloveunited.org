<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" style="color-scheme:only light">
  <defs>
    <radialGradient id="sky" cx="50%" cy="46%" r="78%">
      <stop offset="0" stop-color="#f8f5eb"/>
      <stop offset="0.44" stop-color="#e3ece6"/>
      <stop offset="0.78" stop-color="#d3e2dc"/>
      <stop offset="1" stop-color="#c4d7d0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#79d7c0" stop-opacity="0.2"/>
      <stop offset="0.4" stop-color="#55bea3" stop-opacity="0.4"/>
      <stop offset="0.7" stop-color="#2f8068" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#3a8e77" stop-opacity="0"/>
    </radialGradient>
    <pattern id="speckle" width="128" height="128" patternUnits="userSpaceOnUse">
      <circle cx="17" cy="23" r="1" fill="#1f5e46" opacity="0.16"/>
      <circle cx="83" cy="17" r="0.7" fill="#ffffff" opacity="0.48"/>
      <circle cx="111" cy="71" r="1.1" fill="#3a8e77" opacity="0.12"/>
      <circle cx="48" cy="94" r="0.8" fill="#ffffff" opacity="0.42"/>
      <circle cx="9" cy="119" r="0.6" fill="#1f5e46" opacity="0.12"/>
      <circle cx="71" cy="56" r="0.55" fill="#26694f" opacity="0.14"/>
    </pattern>
    <filter id="mist" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.011" numOctaves="3" seed="19"/>
      <feColorMatrix values="0 0 0 0 0.12  0 0 0 0 0.36  0 0 0 0 0.28  0 0 0 .09 0"/>
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <ellipse cx="800" cy="450" rx="640" ry="460" fill="url(#halo)"/>
  <rect width="1600" height="900" filter="url(#mist)" opacity="0.7"/>
  <rect width="1600" height="900" fill="url(#speckle)" opacity="0.55"/>
</svg>
