<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concept 3: The Diagnosis</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #4ecdc4; font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; display: flex; }
        
        .sidebar { width: 320px; border-right: 1px solid rgba(78,205,196,0.1); padding: 30px; display: flex; flex-direction: column; background: rgba(10,11,18,0.8); z-index: 10; backdrop-filter: blur(10px); }
        
        .sys-header { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #5a5652; margin-bottom: 40px; }
        .sys-header span { color: #7be8d0; font-weight: 700; }
        
        .typing-text { font-size: 14px; line-height: 1.6; color: #e2dfd8; margin-bottom: 30px; min-height: 100px; }
        .cursor { display: inline-block; width: 8px; height: 16px; background: #4ecdc4; animation: blink 1s step-end infinite; vertical-align: middle; }
        
        .telemetry { display: flex; flex-direction: column; gap: 15px; margin-bottom: auto; }
        .t-row { display: flex; justify-content: space-between; border-bottom: 1px dashed rgba(78,205,196,0.2); padding-bottom: 5px; }
        .t-label { font-size: 11px; color: #9a9590; text-transform: uppercase; }
        .t-val { font-size: 12px; font-weight: 700; }
        .t-val.warn { color: #c45c4a; }
        .t-val.safe { color: #5bbf72; }
        
        .btn-init { background: rgba(78,205,196,0.1); border: 1px solid #4ecdc4; color: #4ecdc4; padding: 16px; font-family: 'JetBrains Mono', monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; text-align: center; text-decoration: none; }
        .btn-init:hover { background: #4ecdc4; color: #000; box-shadow: 0 0 15px rgba(78,205,196,0.4); }

        .globe-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        
        /* Faux globe for demo */
        .mock-globe { width: 700px; height: 700px; border-radius: 50%; border: 1px solid rgba(78,205,196,0.1); background: radial-gradient(circle at 30% 30%, rgba(42,143,163,0.1) 0%, rgba(0,0,0,1) 70%); position: relative; box-shadow: inset 0 0 50px rgba(196,92,74,0.1); }
        .pulse-point { position: absolute; width: 12px; height: 12px; background: #c45c4a; border-radius: 50%; top: 30%; left: 60%; box-shadow: 0 0 20px #c45c4a; }
        .pulse-point::after { content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; border: 1px solid #c45c4a; border-radius: 50%; animation: ping 2s infinite; opacity: 0; }
        
        .pulse-point-2 { position: absolute; width: 8px; height: 8px; background: #5bbf72; border-radius: 50%; top: 60%; left: 40%; box-shadow: 0 0 15px #5bbf72; }
        
        .overlay-scan { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(78,205,196,0) 50%, rgba(78,205,196,0.05) 50%); background-size: 100% 4px; pointer-events: none; z-index: 20; opacity: 0.3; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes ping { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
    </style>
</head>
<body>
    <div class="overlay-scan"></div>
    <div class="sidebar">
        <div class="sys-header">SYS <span>GAIA.DIAGNOSTICS</span></div>
        
        <div class="typing-text" id="typewriter"></div>
        
        <div class="telemetry">
            <div class="t-row"><span class="t-label">Atmospheric CO2</span><span class="t-val warn">431.12 PPM</span></div>
            <div class="t-row"><span class="t-label">Temp Anomaly</span><span class="t-val warn">+1.38°C</span></div>
            <div class="t-row"><span class="t-label">Active Nodes</span><span class="t-val safe">4 ONLINE</span></div>
            <div class="t-row"><span class="t-label">System Status</span><span class="t-val warn">CRITICAL</span></div>
        </div>
        
        <a href="../index.html" class="btn-init">INITIALIZE RESTORATION</a>
    </div>
    
    <div class="globe-container">
        <div class="mock-globe">
            <div class="pulse-point"></div>
            <div class="pulse-point-2"></div>
        </div>
    </div>

    <script>
        const text = "> Connection established.\n> Scanning planetary biospherics...\n> Massive carbon hemorrhage detected.\n> 143 Gt emitted annually.\n> Nature capacity overwhelmed.\n> Awaiting intervention protocol.";
        const el = document.getElementById('typewriter');
        let i = 0;
        
        function typeWriter() {
            if (i < text.length) {
                if (text.charAt(i) === '\n') {
                    el.innerHTML += '<br>';
                } else {
                    el.innerHTML += text.charAt(i);
                }
                i++;
                setTimeout(typeWriter, Math.random() * 50 + 20);
            } else {
                el.innerHTML += '<span class="cursor"></span>';
            }
        }
        
        setTimeout(typeWriter, 1000);
    </script>
</body>
</html>
