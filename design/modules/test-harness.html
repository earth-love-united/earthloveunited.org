<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Climate Learning Modules — Earth Love United</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="player/module-player.css">
<style>
  body { background: #050509; }
  .harness-debug {
    position: fixed; bottom: 12px; left: 12px; z-index: 300;
    display: flex; gap: 6px; flex-wrap: wrap; max-width: calc(100% - 24px);
  }
  .harness-debug button {
    padding: 6px 12px; background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.1); border-radius: 4px;
    color: var(--text3); font-size: 10px; cursor: pointer;
    font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px;
    transition: all .2s;
  }
  .harness-debug button:hover { border-color: var(--teal); color: var(--teal); }
  .harness-status {
    position: fixed; bottom: 12px; right: 12px; z-index: 300;
    padding: 6px 12px; background: rgba(0,0,0,.6);
    border: 1px solid rgba(78,205,196,.15); border-radius: 4px;
    color: var(--teal); font-size: 10px; font-family: var(--mono);
  }
</style>
</head>
<body>

<div class="harness-debug">
  <button onclick="ModulePlayer.showHub()">🏠 Hub</button>
  <button onclick="ModulePlayer.resetProgress()">🔄 Reset</button>
  <button onclick="ModulePlayer.loadModule('01-carbon-atom')">⚛️ 01</button>
  <button onclick="ModulePlayer.loadModule('02-keeling-curve')">📈 02</button>
  <button onclick="ModulePlayer.loadModule('03-carbon-budget')">🧮 03</button>
  <button onclick="ModulePlayer.loadModule('04-restoration-projects')">🌱 04</button>
  <button onclick="ModulePlayer.loadModule('05-carbon-market')">💹 05</button>
  <button onclick="ModulePlayer.loadModule('06-drawdown-solutions')">🔧 06</button>
  <button onclick="ModulePlayer.loadModule('07-carbon-footprint')">👣 07</button>
  <button onclick="ModulePlayer.loadModule('08-climate-justice')">⚖️ 08</button>
</div>
<div class="harness-status" id="harness-status">Loading...</div>

<!-- Embedded module data -->
<script src="data/modules/_embedded.js"></script>

<!-- Player engine -->
<script src="player/module-player.js"></script>

<!-- Status bar -->
<script>
setInterval(function() {
  var el = document.getElementById('harness-status');
  if (el && window.ModulePlayer) {
    var s = ModulePlayer.getState();
    el.textContent = 'Modules: ' + Object.keys(s.modules).length +
      ' | XP: ' + s.totalXP +
      ' | ' + (s.currentModule ? s.currentModule.id : 'hub');
  }
}, 1000);
</script>

</body>
</html>
