# ═══════════════════════════════════════════════════════
# CLOUDFLARE WRANGLER CONFIG
# Deploys the GAIA isolate system
# ═══════════════════════════════════════════════════════

name = "gaia-earth-love-united"
main = "dis/worker.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── Environment Variables ───
[vars]
GAIA_SITE_URL = "https://earthloveunited.org"
GAIA_VERSION = "1.0.0"
LLM_MODEL = "google/gemini-2.0-flash-001"

# ─── Secrets (set via wrangler secret put) ───
# OPENROUTER_API_KEY — the platform API key for LLM calls
# Set with: wrangler secret put OPENROUTER_API_KEY

# ─── Durable Objects ───
[[durable_objects.bindings]]
name = "GAIA_SESSIONS"
class_name = "GaiaSessionDurableObject"

[[durable_objects.bindings]]
name = "WORLD"
class_name = "WorldDurableObject"

[[durable_objects.bindings]]
name = "PROFILES"
class_name = "ProfileDurableObject"

# ─── KV Namespaces ───
[[kv_namespaces]]
binding = "WORLD_KV"
id = "gaia_world_state"

[[kv_namespaces]]
binding = "ANALYTICS"
id = "gaia_analytics"

[[kv_namespaces]]
binding = "PROFILE_KV"
id = "gaia_profiles"

# ─── R2 (for static assets if needed) ───
# [[r2_buckets]]
# binding = "ASSETS"
# bucket_name = "gaia-assets"

# ─── D1 (for structured analytics) ───
# [[d1_databases]]
# binding = "DB"
# database_name = "gaia-db"
# database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# ─── Static Assets ───
[assets]
directory = "./dist"
run_on_every_request = false

# ─── Routes ───
# Deploy to: gaia.earthloveunited.org
# Or as a worker route on the main domain

# ─── Observability ───
[observability]
enabled = true
head_sampling_rate = 0.1

# ─── Build ───
[build]
command = "cd dis && python3 build_knowledge_index.py && npm run build"

# ─── Dev ───
[dev]
port = 8787
local_protocol = "http"
