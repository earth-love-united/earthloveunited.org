# ═════════════════════════════════════════════════════════════════
#  CI — Earth Love United
# ═════════════════════════════════════════════════════════════════
#
#  Runs on every PR and every push to main. Four validation layers:
#
#    1. SDK static checks   (verify_load_order.py + node --check)
#    2. Climate truth       (stack-aware validators; strict for reviewed release)
#    3. Headless SmokeTest  (serve the site + run SmokeTest.run()
#                            in Playwright/Chromium)
#    4. StackLint audit     (z-index + invisible-blocker check)
#
#  Required by branch protection. PRs cannot merge until CI is green.
# ═════════════════════════════════════════════════════════════════

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  static:
    name: SDK static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: globe.gl vendor delivery policy
        run: node tools/check-globe-vendor-integrity.js

      - name: Verify script load-order DAG
        run: python3 scripts/verify_load_order.py

      - name: Climate truth CI policy fixtures
        run: node tools/check-climate-truth-ci.js

      - name: Climate runtime diff boundary fixtures
        run: node tools/check-climate-runtime-diff-boundary.js --self-test

      - name: Climate runtime diff boundary
        env:
          CLIMATE_RUNTIME_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          CLIMATE_RUNTIME_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node tools/check-climate-runtime-diff-boundary.js --base "$CLIMATE_RUNTIME_BASE_SHA" --head "$CLIMATE_RUNTIME_HEAD_SHA"

      - name: Climate denied-candidate production readiness
        if: ${{ hashFiles('data/climate/runtime-manifest.json') == '' }}
        run: node tools/check-climate-production-readiness.js --candidate

      - name: Climate reviewed-release production readiness
        if: ${{ hashFiles('data/climate/runtime-manifest.json') != '' }}
        run: node tools/check-climate-production-readiness.js --release

      - name: Climate truth CI (explicit partial stack)
        run: node tools/climate-truth-ci.js --allow-incomplete

      - name: Climate truth CI reviewed-release gate
        if: ${{ hashFiles('data/climate/runtime-manifest.json') != '' }}
        run: node tools/climate-truth-ci.js --strict

      - name: node --check on every JS file
        run: |
          set -e
          FAIL=0
          while IFS= read -r f; do
            if ! node --check "$f" 2>&1; then
              echo "::error file=$f::Syntax error"
              FAIL=1
            fi
          done < <(find js dis -name '*.js' -not -path '*/vendor/*')
          if [ "$FAIL" -eq 1 ]; then exit 1; fi

      - name: Pre-commit hook self-test
        run: |
          chmod +x tools/agent-precommit
          # Stage a no-op so the hook has something to scan
          git config user.email ci@example.com
          git config user.name CI
          # Run the hook directly without committing
          ./tools/agent-precommit || true   # informational on a clean tree

  smoke:
    name: Headless SmokeTest + StackLint
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch verified globe.gl runtime dependency
        run: ./tools/fetch-globe-vendor.sh

      - name: Verify browser-test dependency bytes
        run: node tools/check-globe-vendor-integrity.js --require-file

      - name: Install Playwright + Chromium
        run: |
          npm init -y >/dev/null
          npm install --no-save playwright@1
          npx playwright install chromium --with-deps

      - name: Serve static site in background
        run: |
          python3 -m http.server 8000 &
          echo $! > /tmp/server.pid
          # wait until reachable
          for i in $(seq 1 20); do
            curl -fsS http://localhost:8000/ >/dev/null && break
            sleep 0.5
          done

      - name: Run SmokeTest + StackLint in headless Chromium
        run: |
          cat > runchecks.mjs <<'JS'
          import { chromium } from 'playwright';
          const browser = await chromium.launch();
          const ctx = await browser.newContext();
          const page = await ctx.newPage();

          const consoleErrors = [];
          page.on('pageerror', e => consoleErrors.push('pageerror: ' + e.message));
          page.on('console', m => {
            if (m.type() === 'error') consoleErrors.push('console.error: ' + m.text());
          });

          await page.goto('http://localhost:8000/', { waitUntil: 'networkidle', timeout: 30000 });

          // Wait for the boot validator to finish
          await page.waitForFunction(
            () => window.SmokeTest && window.StackLint,
            { timeout: 10000 }
          );

          const smoke = await page.evaluate(async () => {
            try { return await window.SmokeTest.run(); }
            catch (e) { return { error: String(e) }; }
          });
          const stack = await page.evaluate(() => {
            try { return window.StackLint.audit(); }
            catch (e) { return { error: String(e) }; }
          });

          console.log('SmokeTest:', JSON.stringify(smoke, null, 2));
          console.log('StackLint:', JSON.stringify(stack, null, 2));

          await browser.close();

          const smokeFailed = smoke?.error || (Array.isArray(smoke) && smoke.some(r => r.pass === false));
          const stackFailed = stack?.error || (Array.isArray(stack) && stack.some(r => r.pass === false));

          if (smokeFailed || stackFailed || consoleErrors.length) {
            console.error('❌ checks failed');
            consoleErrors.forEach(e => console.error('  ', e));
            process.exit(1);
          }
          console.log('✅ all checks passed');
          JS
          node runchecks.mjs
          rm -f runchecks.mjs package.json package-lock.json

      - name: Tear down server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then kill "$(cat /tmp/server.pid)" 2>/dev/null || true; fi
